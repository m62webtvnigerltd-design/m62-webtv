<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M62 WEB TV Videos</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f4f4f4;
    margin:0;
    padding:40px;
}

.main-content{
    max-width:1000px;
    margin:auto;
}

h1{
    text-align:center;
    color:#c0392b;
}

.video-form{
    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
    margin-bottom:30px;
}

label{
    display:block;
    margin-top:15px;
    font-weight:bold;
}

input,
textarea,
select{
    width:100%;
    padding:10px;
    margin-top:5px;
    border:1px solid #ccc;
    border-radius:5px;
    box-sizing:border-box;
}

button{
    margin-top:20px;
    background:#c0392b;
    color:white;
    border:none;
    padding:12px 20px;
    cursor:pointer;
    border-radius:5px;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
}

th{
    background:#c0392b;
    color:white;
    padding:12px;
}

td{
    padding:12px;
    border-bottom:1px solid #ddd;
}

.row-2{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
}

.upload-row{
    display:flex;
    gap:10px;
    align-items:center;
}

.upload-row input[type="file"]{
    flex:1;
}

.upload-row button{
    margin-top:0;
    width:auto;
    white-space:nowrap;
}

.upload-status{
    margin-top:6px;
    font-size:13px;
    color:#5f6b77;
}

@media(max-width:820px){
    .row-2{
        grid-template-columns:1fr;
    }
}

.back-btn{
    text-decoration:none;
    color:#c0392b;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="main-content">

<a href="dashboard.html" class="back-btn">← Back To Dashboard</a>

<h1>VIDEO MANAGEMENT</h1>

<div class="video-form">

<label>Video Title</label>
<input type="text" id="videoTitle" placeholder="Enter Video Title">

<label>Description</label>
<textarea id="videoDescription" rows="3" placeholder="Short description"></textarea>

<div class="row-2">
    <div>
        <label>Category</label>
        <input type="text" id="videoCategory" value="General" placeholder="News, Politics, Sports...">
    </div>
    <div>
        <label>Status</label>
        <select id="videoStatus">
            <option value="published">Published</option>
            <option value="draft">Draft</option>
        </select>
    </div>
</div>

<label>YouTube Video Link</label>
<input type="text" id="videoLink" placeholder="Paste external link or use upload below">

<label>Or Upload Video File</label>
<div class="upload-row">
    <input type="file" id="videoFile" accept="video/*">
    <button type="button" id="uploadVideoFile">Upload Video</button>
</div>
<div class="upload-status" id="videoUploadStatus">No video uploaded yet.</div>

<label>Thumbnail URL</label>
<input type="url" id="videoThumbnailUrl" placeholder="https://example.com/thumbnail.jpg">

<label>Or Upload Thumbnail Image</label>
<div class="upload-row">
    <input type="file" id="videoThumbnailFile" accept="image/*">
    <button type="button" id="uploadVideoThumbnail">Upload Thumbnail</button>
</div>
<div class="upload-status" id="videoThumbnailUploadStatus">No thumbnail uploaded yet.</div>

<button onclick="publishVideo()">Publish Video</button>

</div>

<h2>Published Videos</h2>

<button type="button" id="refreshVideosList">Refresh Videos</button>

<table>
<thead>
<tr>
<th>Title</th>
<th>Category</th>
<th>Status</th>
<th>Source</th>
<th>Actions</th>
</tr>
</thead>

<tbody id="videoTable">
</tbody>
</table>

</div>

<script src="../js/main.js"></script>

</body>
</html>
