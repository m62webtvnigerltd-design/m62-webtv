<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M62 WEB TV - Admin Login</title>
<link rel="stylesheet" href="../css/styles.css">
</head>
<body class="admin-login-shell">
<div class="admin-login-panel">
    <h1>Admin Login</h1>
    <p class="subtitle">Sign in with your MongoDB admin user account.</p>

    <form id="adminLoginForm">
        <div class="admin-field">
            <label for="adminLoginEmail">Email</label>
            <input type="email" id="adminLoginEmail" autocomplete="username" required>
        </div>

        <div class="admin-field">
            <label for="adminLoginPassword">Password</label>
            <input type="password" id="adminLoginPassword" autocomplete="current-password" required>
        </div>

        <button class="admin-btn" type="submit" id="adminLoginSubmit" style="width:100%; margin-top:10px;">Sign In</button>
    </form>

    <div class="status" id="adminLoginStatus"></div>

    <div class="admin-links-row">
        <a href="dashboard.html">Back to Dashboard</a>
        <a href="comments.html">Open Moderation</a>
    </div>

    <p class="admin-muted" style="margin-top:12px;">Legacy mode still works with ADMIN_API_KEY in moderation page if needed.</p>
</div>
<script src="../js/main.js"></script>
</body>
</html>
