<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline | M62 WEB TV NIGER</title>
    <meta name="robots" content="noindex, nofollow">
    <meta name="theme-color" content="#c0392b">
    <style>
        :root {
            color-scheme: light;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at top, #1f1f1f 0%, #0f0f0f 45%, #080808 100%);
            color: #f5f5f5;
            display: grid;
            place-items: center;
            padding: 24px;
        }

        .offline-card {
            width: min(680px, 100%);
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 16px;
            padding: 28px;
            backdrop-filter: blur(4px);
        }

        h1 {
            margin: 0 0 12px;
            font-size: 1.7rem;
        }

        p {
            margin: 0 0 14px;
            line-height: 1.6;
            color: #e8e8e8;
        }

        a {
            color: #ff8c6a;
        }
    </style>
</head>
<body>
    <main class="offline-card" role="main" aria-live="polite">
        <h1>You are offline</h1>
        <p>M62 WEB TV public pages are temporarily unavailable because your internet connection is offline.</p>
        <p>Reconnect and refresh to continue browsing live updates.</p>
        <p><a href="/">Return to homepage</a></p>
    </main>
</body>
</html>
